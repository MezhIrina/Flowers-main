<script>
  $(function () {
    var $menu = $(".orders-status-menu");
    var $items = $menu.find(".orders-status-menu__item");
    $items.each(function () {
      var $it = $(this);
      var $iconWrap = $it.find(".orders-status-menu__item_right_icon");
      var $img = $iconWrap.find("img").first();
      if ($img.length) {
        $img.data("orig-src", $img.attr("src"));
      } else {
        $iconWrap.data("orig-has-img", false);
      }
    });
    function setActive($item) {
      $items.each(function () {
        var $it = $(this);
        $it.removeClass("active-status");
        $it.css("background-color", "#fff");
        $it
          .find(".orders-status-menu__item_right_status")
          .css("color", "#C2A2A9");
        $it.find(".orders-status-menu__item_count").css("color", "#424242");
        if ($it.data("cell")) {
          $it.parent().css("background-color", "#fff");
        }

        var $iconWrap = $it.find(".orders-status-menu__item_right_icon");
        var $img = $iconWrap.find("img").first();
        if ($img.length) {
          var origSrc = $img.data("orig-src");
          if (origSrc) $img.attr("src", origSrc);
        } else {

          $iconWrap.find("img._dynamic_active_img").remove();
        }
      });

      $item.addClass("active-status");
      var moduleColor =
        $item.attr("data-module-color") || $item.data("module-color");
      var textColor = $item.attr("data-text-color") || $item.data("text-color");
      if (moduleColor) {

        $item.css({
          "background-color": moduleColor, 
        });
        if ($item.data("cell")) {
          $item.parent().css("background-color", moduleColor);
        }

        $item
          .find(".orders-status-menu__item_right_status")
          .css("color", textColor);
        $item.find(".orders-status-menu__item_count").css("color", textColor);
      }

      var activeImage =
        $item.attr("data-active-image") || $item.data("active-image");
      if (activeImage) {
        activeImage = "../../img/" + activeImage;
      }

      var $iconWrap = $item
        .find(".orders-status-menu__item_right_icon")
        .first();
      if (activeImage && $iconWrap.length) {
        var $img = $iconWrap.find("img").first();
        if ($img.length) {
          $img.attr("src", activeImage);
        } else {

          $("<img/>", {
            src: activeImage,
            alt: "active icon",
            class: "_dynamic_active_img",
          }).appendTo($iconWrap);
        }
      }

      var activePage =
        $item.attr("data-active-page") || $item.data("active-page");
      if (activePage) {
        var pagePath = activePage;

        if (!/\.html$/.test(pagePath)) pagePath = pagePath + ".html";
   
        $(".left-sis").load(pagePath, function (response, status, xhr) {
          if (status === "error") {
            console.error("Ошибка загрузки:", pagePath, xhr && xhr.statusText);

            $(".left-sis").html(
              '<div class="load-error">Не удалось загрузить содержимое.</div>',
            );
          }
        });
      } else {

        $(".left-sis").empty();
      }
    }
 
    $items.on("click", function (e) {
      e.preventDefault();
      var $this = $(this);
      setActive($this);
    });

    var $default = $items.filter("[data-active-page]").first();
    if ($default.length === 0) $default = $items.first();
    if ($default.length) setActive($default);
  });

  $(document).ready(function () {
    var $orderList = $(".order-list");
    var $items = $orderList.find(".order-card__item");
    var $right = $(".info-section-order-right");
    var emptyMessage = $right.attr("data-empty") || "Нет данных";
    function showEmpty() {
      $right.addClass("empty-info-sect");
    }

    if ($items.filter(".active-order").length === 0) {
      showEmpty();
    }
    $(document).on("click", ".order-card__item", function (e) {
      e.preventDefault();
      var $this = $(this);
      if ($(this).hasClass("active-order")) return;
      $items.removeClass("active-order");
      $(this).addClass("active-order");
      var instance =
        $(this).attr("data-instance") || $(this).data("instance") || "";
      if (!instance) {
        showEmpty();
        return;
      }
      var filePath = instance;
      if (!/\.html$/.test(filePath)) filePath = filePath + ".html";

      $right.load(filePath, function (response, status, xhr) {
        if (status === "error") {
          console.error("нет файла");
        } else {
          $right.removeClass("empty-info-sect");
        }
      });
    });
  });

  function openModal(modalClass) {
    $("." + modalClass).addClass("open");
    $("body").css("overflow", "hidden");
    return false;
  }
  function closeModal(modalClass) {
    $("body").css("overflow", "auto");
    $("." + modalClass).removeClass("open");
    return false;
  }

  $(document).on("change", ".fileInputWrapper .fileInput", function () {
  const wrapper = $(this).closest(".fileInputWrapper");
  const file = this.files && this.files[0];
  if (file) {
    const preview = wrapper.find(".preview");
    // Показываем превью
    preview[0].style.backgroundImage = `url('${URL.createObjectURL(file)}')`;
    preview.addClass("input_photo_full input_photo");
    wrapper.find(".image_load").addClass("image_load_icon");
    wrapper.find(".image_reload").html('<p>Заменить</p>');
    wrapper.find(".image_load .image_delete").removeClass("hide");


  } 
});

$(document).on("click", ".fileInputWrapper .image_delete", function () {
  const wrapper = $(this).closest(".fileInputWrapper");
  const preview = wrapper.find(".preview");
    preview[0].style.backgroundImage = `none`;
    preview.removeClass("input_photo_full input_photo");
    wrapper.find(".image_load").removeClass("image_load_icon");
    wrapper.find(".image_reload").html('<div class="input_photo" style="background-image: url(/img/default_load.png);"></div>');
    wrapper.find(".image_load .image_delete").addClass("hide");
 
});
</script>
