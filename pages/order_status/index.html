<script>
  $(function () {
    var $menu = $(".orders-status-menu");
    var $items = $menu.find(".orders-status-menu__item");
    // Сохраняем оригинальные цвета/изображения для восстановления
    $items.each(function () {
      var $it = $(this);
      // найдем <img> внутри .orders-status-menu__item_right_icon (если есть) и сохраним src
      var $iconWrap = $it.find(".orders-status-menu__item_right_icon");
      var $img = $iconWrap.find("img").first();
      if ($img.length) {
        $img.data("orig-src", $img.attr("src"));
      } else {
        // поместим пустую data, чтобы потом знать, что картинки не было
        $iconWrap.data("orig-has-img", false);
      }
    });
    // Функция установки активного состояния на элемент
    function setActive($item) {
      // Снять "актив" со всех
      $items.each(function () {
        var $it = $(this);
        $it.removeClass("active-status");
        $it.css("background-color", "#fff");
        $it
          .find(".orders-status-menu__item_right_status")
          .css("color", "#C2A2A9");
        $it.find(".orders-status-menu__item_count").css("color", "#424242");
        if ($it.data("cell")) {
          $it.parent().css("background-color", "#fff");
        }
        // Восстанавливаем изображение если было
        var $iconWrap = $it.find(".orders-status-menu__item_right_icon");
        var $img = $iconWrap.find("img").first();
        if ($img.length) {
          var origSrc = $img.data("orig-src");
          if (origSrc) $img.attr("src", origSrc);
        } else {
          // если активный элемент устанавливал img dynamically, удалим его
          $iconWrap.find("img._dynamic_active_img").remove();
        }
      });
      // Применяем активному элементу стили из data-*
      $item.addClass("active-status");
      var moduleColor =
        $item.attr("data-module-color") || $item.data("module-color");
      var textColor = $item.attr("data-text-color") || $item.data("text-color");
      if (moduleColor) {
        // примеры применения: меняем цвет текста и border-left (настраиваем по желанию)
        $item.css({
          "background-color": moduleColor, // при необходимости можно установить фон
        });
        if ($item.data("cell")) {
          $item.parent().css("background-color", moduleColor);
        }
        // если нужно изменить внутренний текст цвет отдельно:
        $item
          .find(".orders-status-menu__item_right_status")
          .css("color", textColor);
        $item.find(".orders-status-menu__item_count").css("color", textColor);
      }
      // Заменяем картинку, если data-active-image задан
      var activeImage =
        $item.attr("data-active-image") || $item.data("active-image");
      if (activeImage) {
        activeImage = "../../img/" + activeImage;
      }

      var $iconWrap = $item
        .find(".orders-status-menu__item_right_icon")
        .first();
      if (activeImage && $iconWrap.length) {
        var $img = $iconWrap.find("img").first();
        if ($img.length) {
          $img.attr("src", activeImage);
        } else {
          // создаем img, если его не было — помечаем как динамический
          $("<img/>", {
            src: activeImage,
            alt: "active icon",
            class: "_dynamic_active_img",
          }).appendTo($iconWrap);
        }
      }
      // Загружаем страницу в left-sis по data-active-page
      var activePage =
        $item.attr("data-active-page") || $item.data("active-page");
      if (activePage) {
        var pagePath = activePage;
        // если значение вроде "allOrders", подставляем ".html"
        if (!/\.html$/.test(pagePath)) pagePath = pagePath + ".html";
        // Загружаем содержимое в .left-sis
        $(".left-sis").load(pagePath, function (response, status, xhr) {
          if (status === "error") {
            console.error("Ошибка загрузки:", pagePath, xhr && xhr.statusText);
            // Можно показать сообщение пользователю:
            $(".left-sis").html(
              '<div class="load-error">Не удалось загрузить содержимое.</div>',
            );
          }
        });
      } else {
        // если data-active-page пуст — можно очистить left-sis или оставить как есть — оставлю пустой
        $(".left-sis").empty();
      }
    }
    // Навешиваем клик-обработчик
    $items.on("click", function (e) {
      e.preventDefault();
      var $this = $(this);
      setActive($this);
    });
    // (Опционально) — поставить активный по умолчанию: первый элемент с data-active-page или первый в списке
    var $default = $items.filter("[data-active-page]").first();
    if ($default.length === 0) $default = $items.first();
    if ($default.length) setActive($default);
  });

  $(document).ready(function () {
    var $orderList = $(".order-list");
    var $items = $orderList.find(".order-card__item");
    var $right = $(".info-section-order-right");
    var emptyMessage = $right.attr("data-empty") || "Нет данных";
    function showEmpty() {
      $right.addClass("empty-info-sect");
    }

    if ($items.filter(".active-order").length === 0) {
      showEmpty();
    }
    // Клик по заказу
    $(document).on("click", ".order-card__item", function (e) {
      
      e.preventDefault();
      var $this = $(this);
      // если клик по уже активному — ничего не делаем (опционально можно ре-загрузить)
      if ($(this).hasClass("active-order")) return;
      // снять актив у всех и поставить текущий
      $items.removeClass("active-order");
      $(this).addClass("active-order");
      // взять атрибут data-instance
      var instance = $(this).attr("data-instance") || $(this).data("instance") || "";
          console.log("pp");
           console.log($(this));
      if (!instance) {
        // если нет instance — показываем пустое сообщение
        showEmpty();
        return;
      }
      // формируем путь к файлу: предполагаем instanceName -> instanceName.html
      var filePath = instance;
      if (!/\.html$/.test(filePath)) filePath = filePath + ".html";

   
      $right.load(filePath, function (response, status, xhr) {
        if (status === "error") {
          console.error("нет файла");
        } else {
          $right.removeClass("empty-info-sect");
        }
      });
    });
  });


</script>
